name: Deploy to Oracle Cloud

on:
  push:
    branches: [ main ]  # main 브랜치에 코드가 올라가면 실행

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Deploy to Oracle Cloud via SSH
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.ORACLE_HOST }}        # 오라클 서버 IP (GitHub Secrets에 등록 필요)
        username: ubuntu                        # 오라클 서버 기본 사용자
        key: ${{ secrets.ORACLE_SSH_KEY }}      # 오라클 서버 접속용 SSH 비밀키 (GitHub Secrets에 등록 필요)
        port: 22
        script: |
          # 1. 프로젝트 폴더가 없으면 클론, 있으면 폴더로 이동 후 업데이트
          if [ ! -d "levyplay" ]; then
            git clone https://github.com/${{ github.repository }}.git levyplay
            cd levyplay
          else
            cd levyplay
            git pull origin main
          fi

          # 1.5 Docker 설치 확인 및 자동 설치 (최초 1회용)
          if ! command -v docker &> /dev/null; then
            echo "Docker not found. Installing..."
            # 필수 패키지 설치
            sudo apt-get update
            sudo apt-get install -y ca-certificates curl gnupg
            
            # Docker GPG 키 추가
            sudo install -m 0755 -d /etc/apt/keyrings
            curl -fsSL https://download.docker.com/linux/ubuntu/gpg | sudo gpg --dearmor -o /etc/apt/keyrings/docker.gpg
            sudo chmod a+r /etc/apt/keyrings/docker.gpg

            # Docker 저장소 설정
            echo \
              "deb [arch=\"$(dpkg --print-architecture)\" signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu \
              $(. /etc/os-release && echo \"$VERSION_CODENAME\") stable" | \
              sudo tee /etc/apt/sources.list.d/docker.list > /dev/null
            
            # Docker 설치
            sudo apt-get update
            sudo apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
            
            # 현재 사용자(ubuntu)에게 Docker 권한 부여
            sudo usermod -aG docker ubuntu
            # 권한 적용을 위해 그룹 아이디로 실행하거나, 다음 세션부터 적용됨 (sudo 사용하므로 당장은 OK)
          fi

          # 1.6 방화벽(3001번 포트) 열기 (iptables 초기화 문제 해결)
          # 오라클 클라우드는 기본적으로 iptables가 빡빡해서 포트를 막습니다.
          # 영구적으로 3001번을 엽니다.
          if ! sudo iptables -C INPUT -p tcp --dport 3001 -j ACCEPT 2>/dev/null; then
             echo "Opening port 3001..."
             sudo iptables -I INPUT 6 -m state --state NEW -p tcp --dport 3001 -j ACCEPT
             sudo netfilter-persistent save || true  # 설정 저장 (재부팅 시 유지)
          fi

          # 2. Docker 이미지 빌드 (기존 것 덮어씌움)
          sudo docker build -t levyplay-app .

          # 3. 기존 컨테이너 중지 및 삭제 (에러 무시)
          sudo docker stop levyplay-container || true
          sudo docker rm levyplay-container || true

          # 4. 새 컨테이너 실행 (항상 재시작, 3001번 포트 사용)
          # auth.json이 있으면 마운트 (로그인 유지)
          AUTH_MOUNT=""
          if [ -f "auth.json" ]; then
            AUTH_MOUNT="-v $(pwd)/auth.json:/app/auth.json"
          fi

          sudo docker run -d \
            --name levyplay-container \
            --restart unless-stopped \
            -p 3001:3001 \
            --ipc=host \
            $AUTH_MOUNT \
            levyplay-app
            
          # 5. 불필요한 미사용 이미지 정리 (용량 확보)
          sudo docker image prune -f
